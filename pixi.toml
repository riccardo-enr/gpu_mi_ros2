[workspace]
name = "gpu_mi_ros2"
version = "0.1.0"
description = "GPU-accelerated mutual information field node for ROS 2"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.12,<3.13"

[pypi-dependencies]
empy = "==3.3.4"  # ROS rosidl generators are incompatible with empy 4.x
catkin-pkg = "*"
lark = "*"
numpy = "*"
pyyaml = "*"
scienceplots = "*"

[feature.dev.pypi-dependencies]
pytest = "*"
black = "*"
ruff = "*"

[feature.dev.tasks]
lint = "ruff format . && ruff check . --fix"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
# Install gpu_mi Python bindings from the submodule
install-gpu-mi = "pip install -e external/gpu_mi --no-build-isolation"
deps = "rosdep update && rosdep install --from-paths src --ignore-src -r -y"
build = "colcon build --symlink-install --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"
build-release = "colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"
test = "colcon test"
clean = "rm -rf build install log"
launch = { cmd = "bash -c 'source install/setup.bash && exec ros2 launch gpu_mi_ros2 mi_field.launch.py \"$@\"' --" }
sim = { cmd = "bash -c 'source install/setup.bash && exec ros2 launch gpu_mi_ros2 sim.launch.py \"$@\"' --", depends-on = ["build"] }
demo = { cmd = "bash -c 'source install/setup.bash && exec ros2 launch gpu_mi_ros2 demo.launch.py \"$@\"' --", depends-on = ["build"] }
teleop = { cmd = "bash -c 'source install/setup.bash && exec ros2 run teleop_twist_keyboard teleop_twist_keyboard' --" }

[activation]
scripts = ["scripts/setup_env.sh"]
