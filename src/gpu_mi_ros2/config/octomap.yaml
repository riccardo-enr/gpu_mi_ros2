octomap_server:
  ros__parameters:
    resolution: 0.1
    frame_id: map
    base_frame_id: base_link

    # Indoor RGBD sensor model (Realsense-class). max_range stays inside the
    # camera <far> clip with margin; hit/miss/min/max are octomap_server's
    # standard inverse-sensor defaults that work well for cluttered indoor
    # scenes.
    sensor_model.max_range: 5.0
    sensor_model.hit: 0.7
    sensor_model.miss: 0.4
    sensor_model.min: 0.12
    sensor_model.max: 0.97

    # Trim the floor and ceiling from the projected occupancy grid so Nav2
    # costmaps don't see the ground as an obstacle.
    occupancy_min_z: 0.05
    occupancy_max_z: 2.0

    pointcloud_min_z: -0.5
    pointcloud_max_z: 3.0

    filter_ground: false
    latch: false
    publish_free_space: false
    colored_map: false
    color_factor: 0.8

    use_sim_time: true
