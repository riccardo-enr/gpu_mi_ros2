# Nav2 bringup parameters for the demo_robot diff-drive (issue #11).
#
# Conventions specific to this milestone:
# - Global costmap consumes /projected_map (the 2D occupancy grid published by
#   octomap_server when occupancy_min_z/max_z trim floor + ceiling). map server
#   is intentionally NOT used; in 3D mode there is no slam_toolbox.
# - Local costmap is rolling, fed by /scan (front-facing 2D lidar, +/-60 deg).
# - Footprint is the actual 0.4 x 0.3 m chassis polygon (not robot_radius) so
#   tight cyberzoo corridors don't waste clearance on a circumscribed circle.
# - Velocity caps are conservative (vx <= 0.5 m/s, vtheta <= 1.0 rad/s) -- the
#   sim DiffDrive plugin can do +/-2 m/s but Nav2 doesn't need to push the
#   chassis envelope for an indoor demo at 0.1 m occupancy resolution.

amcl:
  # AMCL is not used (no map server; we trust /projected_map + perfect sim
  # odom). Block kept here for completeness so nav2_bringup helpers don't
  # complain about missing scope; the lifecycle manager does NOT start it.
  ros__parameters:
    use_sim_time: true

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    # Jazzy defaults to TwistStamped on /cmd_vel; our ros_gz_bridge YAML maps
    # /cmd_vel as plain Twist (which is what gz DiffDrive expects). Force the
    # legacy Twist output so the bridge forwards velocities to Gazebo.
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.30
      stateful: true

    FollowPath:
      # RegulatedPurePursuit: simpler than DWB and more reliable for diff-drive.
      # No trajectory sampling -- regulates linear speed by curvature, proximity
      # to obstacles, and approach-to-goal. Defaults below mirror Nav2's official
      # diff-drive example with conservative caps for the cyberzoo demo.
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5
      max_vel_x: 0.5
      max_vel_theta: 1.0
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      # Local costmap clearance is enforced by inflation; RPP's own forward
      # collision check is redundant and was tripping on the inflation
      # gradient near the spawn corner.
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 2.0
      max_robot_pose_search_dist: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.2, 0.15], [0.2, -0.15], [-0.2, -0.15], [-0.2, 0.15]]"
      footprint_padding: 0.02
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # SmacPlanner2D requires inflation_radius >= half the robot's largest
        # cross-section for its optimized non-circular collision check
        # (largest cross-section is the chassis diagonal sqrt(0.4^2 + 0.3^2) =
        # 0.5 m, so >= 0.25 m). Below this it falls back to a slow path that
        # produced paths RPP couldn't follow.
        inflation_radius: 0.25

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      track_unknown_space: true
      resolution: 0.10
      # Explicit 20 x 20 m window anchored at (-5, -5) so the robot's spawn
      # at (0, 0) is comfortably inside from t=0. Without this the costmap
      # auto-sizes to /projected_map's first publish, which begins at
      # (0, -1) due to the camera's near-plane -- leaving the robot epsilon
      # outside the map and breaking SmacPlanner2D's start-cell lookup.
      # Static layer paints whatever /projected_map covers; the rest stays
      # unknown, and SmacPlanner2D's allow_unknown=true plans through it.
      width: 20
      height: 20
      origin_x: -5.0
      origin_y: -5.0
      footprint: "[[0.2, 0.15], [0.2, -0.15], [-0.2, -0.15], [-0.2, 0.15]]"
      footprint_padding: 0.02
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /projected_map
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          obstacle_max_range: 10.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # SmacPlanner2D requires inflation_radius >= half the robot's largest
        # cross-section for its optimized non-circular collision check
        # (largest cross-section is the chassis diagonal sqrt(0.4^2 + 0.3^2) =
        # 0.5 m, so >= 0.25 m). Below this it falls back to a slow path that
        # produced paths RPP couldn't follow.
        inflation_radius: 0.25

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
